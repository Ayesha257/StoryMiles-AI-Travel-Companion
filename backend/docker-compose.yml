services:
  db:
    image: postgres:17
    platform: linux/amd64
    environment:
      POSTGRES_DB: storymiles
      POSTGRES_USER: storymiles
      POSTGRES_PASSWORD: storymiles
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storymiles -d storymiles"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://storymiles:storymiles@db:5432/storymiles
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
